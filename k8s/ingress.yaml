apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloud-engine-v3-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: cloud-engine-v3.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cloud-engine-v3-service
            port:
              number: 80
